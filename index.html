const makeAtt=(seed,rate)=>{
  let s=seed*1000;const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  const att={};
  [[2026,1],[2026,2],[2026,3],[2026,4]].forEach(([y,m])=>{
    const days=new Date(y,m,0).getDate();
    for(let d=1;d<=days;d++){
      const dow=new Date(y,m-1,d).getDay();if(dow===0||dow===6)continue;
      if(r()>0.45)continue;
      const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;att[ds]=r()<rate;
    }
  });
  return att;
};
const makeRatings=(base,seed)=>{
  let s=seed*777;const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  const off=()=>Math.round((r()-0.4)*2);const ratings={};
  [["2026-02"],["2026-03"],["2026-04"]].forEach(([k])=>{
    ratings[k]={T:Math.min(10,Math.max(1,base.T+off())),Ta:Math.min(10,Math.max(1,base.Ta+off())),F:Math.min(10,Math.max(1,base.F+off())),P:Math.min(10,Math.max(1,base.P+off()))};
  });
  return ratings;
};

// ── Dashboard
function Dashboard({players,sessions,setNav,openPlayer,mob}){
  const upcoming=[];
  Object.entries(sessions).forEach(([ds,arr])=>{if(ds>=TODAY)arr.forEach(s=>{const p=players.find(x=>x.id===s.pid);if(p)upcoming.push({...s,ds,pname:p.name});});});
  upcoming.sort((a,b)=>a.ds.localeCompare(b.ds)||a.time.localeCompare(b.time));
  const CM=[1,2,3,4,5];let exp=players.length*CM.length*FEE,coll=0;
  players.forEach(p=>CM.forEach(m=>{if((p.mem||{})["2026-"+String(m).padStart(2,"0")]==="paid")coll+=FEE;}));
  const out=exp-coll;
  const noR=players.filter(p=>!p.ratings["2026-04"]&&!p.ratings["2026-05"]);
  const oweMay=players.filter(p=>(p.mem||{})["2026-05"]!=="paid");
  const fmt=n=>n.toLocaleString("sr-RS")+" RSD";
  const pad=mob?"16px":"34px 42px";

    <div style={{padding:pad}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?28:38,fontWeight:800,letterSpacing:"-1px",marginBottom:4}}>DASHBOARD</div>
      <div style={{color:"#888",fontSize:12,marginBottom:mob?16:24}}>8. Maj 2026</div>
      <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:mob?9:12,marginBottom:mob?12:16}}>
        {[
          [players.length,"Aktivnih igrača","#0A0A0A"],

          <div key={l} style={{background:"white",border:"1px solid #E2E2E2",borderRadius:10,padding:mob?"12px 14px":"16px 20px",borderTop:"4px solid "+c}}>

            <div style={{fontSize:mob?10:11,color:"#888",marginTop:4}}>{l}</div>

      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:mob?10:12,marginBottom:mob?10:12}}>
        <div style={{background:"white",border:"1px solid #E2E2E2",borderRadius:12,padding:mob?16:22}}>

            <div style={{width:`${(coll/exp*100).toFixed(0)}%`,height:"100%",background:"#16A34A"}}/>

function DolasciT({p,setP,mob}){

  const NB={background:"white",border:"1px solid #E2E2E2",borderRadius:7,width:32,height:32,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"};

          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:c}}>{v}</div>
          <div style={{fontSize:9,color:"#888",marginTop:1}}>{l}</div>

function ClanT({p,setP}){
  const m=p.mem||{};const yr=2026;
  const tog=k=>{const cur=m[k];const u={...m};if(cur===undefined)u[k]="paid";else if(cur==="paid")u[k]="unpaid";else delete u[k];setP({...p,mem:u});};
  const paid=Object.values(m).filter(v=>v==="paid").length;const unp=Object.values(m).filter(v=>v==="unpaid").length;
  const cs=k=>{const v=m[k];if(v==="paid")return{background:"#F0FDF4",border:"2px solid #16A34A",color:"#16A34A"};if(v==="unpaid")return{background:"#FEF2F2",border:"2px solid #DC2626",color:"#DC2626"};return{background:"#FAFAFA",border:"1px solid #E2E2E2",color:"#CCC"};};
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
      {[["Plaćeno",paid,"#16A34A"],["Duguje",unp,"#DC2626"],["Nije uneto",12-paid-unp,"#888"]].map(([l,v,c])=>(
        <div key={l} style={{background:"white",border:"1px solid #E2E2E2",borderRadius:9,padding:"10px 12px"}}>

    </div>
    <div style={{background:"white",border:"1px solid #E2E2E2",borderRadius:11,padding:16,marginBottom:11}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:"0.5px",marginBottom:12}}>{yr}. GODINA</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {MONTHS_S.map((mon,i)=>{const k=`${yr}-${String(i+1).padStart(2,"0")}`;const s=cs(k);
          return<button key={k} onClick={()=>tog(k)} style={{...s,padding:"9px 4px",borderRadius:7,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:10,textAlign:"center",transition:"all 0.15s"}}>
            <div>{mon}</div>
            <div style={{fontSize:7,marginTop:2,opacity:0.7}}>{m[k]==="paid"?"✓":m[k]==="unpaid"?"×":"—"}</div>
          </button>;
        })}
      </div>
    </div>
    <div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:9,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,color:"#166534",fontWeight:600}}>Ukupno naplaćeno</span>
      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,color:"#16A34A"}}>{(paid*FEE).toLocaleString("sr-RS")} RSD</span>
    </div>
  </div>);
}

// ── Planer (Monthly Calendar)
function Planer({players,sessions,setSessions,mob}){
  const [vm,setVm]=useState(NOW.getMonth());const [vy,setVy]=useState(NOW.getFullYear());
  const [sel,setSel]=useState(null);const [showM,setShowM]=useState(false);const [addS,setAddS]=useState(false);
  const [dp,setDp]=useState("");const [dt,setDt]=useState("16:00");const [dty,setDty]=useState("Individualni trening");const [dn,setDn]=useState("");
  const days=new Date(vy,vm+1,0).getDate();const fd=(new Date(vy,vm,1).getDay()+6)%7;
  const addSession=()=>{
    if(!dp||!sel)return;
    const ns={id:Date.now(),pid:+dp,time:dt,type:dty,note:dn};
    setSessions(prev=>({...prev,[sel]:[...(prev[sel]||[]),ns]}));
    setAddS(false);setDp("");setDt("16:00");setDty("Individualni trening");setDn("");
  };
  const remS=(ds,id)=>setSessions(prev=>({...prev,[ds]:(prev[ds]||[]).filter(s=>s.id!==id)}));
  const selSess=sel?(sessions[sel]||[]).sort((a,b)=>a.time.localeCompare(b.time)):[];
  const NB={background:"white",border:"1px solid #E2E2E2",borderRadius:7,width:32,height:32,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"};
  const pad=mob?"16px":"34px 42px";
  const cellH=mob?70:90;
  return(
    <div style={{padding:pad}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:18}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?26:38,fontWeight:800,letterSpacing:"-1px"}}>PLANER</div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>{if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1);}} style={NB}>←</button>
          <button onClick={()=>{setVm(NOW.getMonth());setVy(NOW.getFullYear());}} style={{...NB,width:"auto",padding:"0 10px",fontSize:9,fontWeight:700}}>DANAS</button>
          <button onClick={()=>{if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1);}} style={NB}>→</button>
        </div>
      </div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?16:18,fontWeight:800,marginBottom:14,letterSpacing:"-0.3px"}}>{MONTHS[vm].toUpperCase()} {vy}</div>
      <div style={{background:"white",border:"1px solid #E2E2E2",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#0A0A0A"}}>
          {DAYS_SR.map(d=><div key={d} style={{padding:mob?"6px 0":"8px 0",textAlign:"center",fontSize:mob?8:9,fontWeight:700,color:"white",letterSpacing:"1px"}}>{d.toUpperCase()}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {Array(fd).fill(null).map((_,i)=><div key={`e${i}`} style={{borderRight:"1px solid #F5F5F5",borderBottom:"1px solid #F5F5F5",minHeight:cellH,background:"#FAFAFA"}}/>)}
          {Array(days).fill(null).map((_,i)=>{
            const day=i+1;const ds=`${vy}-${String(vm+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const daySess=(sessions[ds]||[]).sort((a,b)=>a.time.localeCompare(b.time));
            const isT=ds===TODAY;const isSel=ds===sel;const isPast=ds<TODAY;
            return(
              <div key={day} onClick={()=>{setSel(ds);setShowM(true);setAddS(false);}}
                style={{borderRight:"1px solid #F5F5F5",borderBottom:"1px solid #F5F5F5",minHeight:cellH,padding:mob?"4px 3px":"7px 5px",cursor:"pointer",background:isSel?"#EFF6FF":isT?"#FFFBF0":isPast?"#FAFAFA":"white",position:"relative"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?14:16,fontWeight:800,color:isT?"#D97706":isPast?"#CCC":"#0A0A0A",marginBottom:2}}>
                  {day}
                </div>
                {daySess.slice(0,mob?1:3).map(s=>{const pl=players.find(x=>x.id===s.pid);const c=TC[s.type]||"#888";return(
                  <div key={s.id} style={{background:c+"18",borderLeft:"2px solid "+c,borderRadius:"0 3px 3px 0",padding:"1px 3px",marginBottom:2}}>
                    <div style={{fontSize:mob?7:8,fontWeight:700,color:c,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{mob?s.time:(s.time+" "+((pl?.name||"").split(" ")[0]||"?"))}</div>
                  </div>
                );})}
                {daySess.length>(mob?1:3)&&<div style={{fontSize:7,color:"#888"}}>+{daySess.length-(mob?1:3)}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {/* Modal */}
      {showM&&sel&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:mob?"flex-end":"center",justifyContent:"center",zIndex:100}} onClick={e=>{if(e.target===e.currentTarget){setShowM(false);setAddS(false);}}}>
          <div style={{background:"white",borderRadius:mob?"16px 16px 0 0":"16px",padding:24,width:mob?"100%":"440px",maxHeight:mob?"90vh":"80vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:800}}>{sel.slice(8,10)}.{sel.slice(5,7)}.{sel.slice(0,4)}.</div>
              <button onClick={()=>{setShowM(false);setAddS(false);}} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#888"}}>×</button>
            </div>
            {selSess.length===0&&!addS&&<div style={{color:"#AAA",fontSize:12,marginBottom:14,fontStyle:"italic"}}>Nema termina za ovaj dan.</div>}
            {selSess.map(s=>{const pl=players.find(x=>x.id===s.pid);const c=TC[s.type]||"#888";return(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 10px",borderRadius:8,marginBottom:7,background:"#FAFAFA",border:"1px solid #F0F0F0"}}>
                <div style={{width:3,height:34,background:c,borderRadius:2,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800}}>{s.time}</span>
                    <span style={{fontSize:12,fontWeight:600}}>{pl?.name||"?"}</span>
                  </div>
                  <div style={{fontSize:10,color:c,fontWeight:600,marginTop:1}}>{s.type}</div>
                </div>
                <button onClick={()=>remS(sel,s.id)} style={{background:"none",border:"none",color:"#CCC",cursor:"pointer",fontSize:15,padding:3}}>×</button>
              </div>
            );})}
            {addS?(
              <div style={{background:"#F8F8F8",borderRadius:10,padding:16,marginTop:10}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:"1px",marginBottom:12}}>NOVI TERMIN</div>
                <div style={{marginBottom:10}}><Lbl c="Igrač"/>
                  <select value={dp} onChange={e=>setDp(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #E2E2E2",borderRadius:7,fontFamily:"inherit",fontSize:13,outline:"none"}}>
                    <option value="">Odaberi igrača</option>
                    {players.map(pl=><option key={pl.id} value={pl.id}>{pl.name}</option>)}
                  </select>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:10}}>
                  <div><Lbl c="Vreme"/><input type="time" value={dt} onChange={e=>setDt(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #E2E2E2",borderRadius:7,fontFamily:"inherit",fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                  <div><Lbl c="Tip"/><select value={dty} onChange={e=>setDty(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #E2E2E2",borderRadius:7,fontFamily:"inherit",fontSize:13,outline:"none"}}>{SESSION_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                </div>
                <div style={{marginBottom:12}}><Lbl c="Napomena"/><input value={dn} onChange={e=>setDn(e.target.value)} style={{width:"100%",padding:"8px 10px",border:"1px solid #E2E2E2",borderRadius:7,fontFamily:"inherit",fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
                <div style={{display:"flex",gap:7}}>
                  <Btn ch="Dodaj" onClick={addSession} s={{flex:1,padding:"9px",fontSize:12}}/>
                  <Btn ch="Odustani" onClick={()=>setAddS(false)} v="light" s={{flex:1,padding:"9px",fontSize:12}}/>
                </div>
              </div>
            ):(
              <button onClick={()=>setAddS(true)} style={{width:"100%",marginTop:10,padding:"11px",border:"2px dashed #E2E2E2",borderRadius:8,background:"none",fontFamily:"inherit",fontSize:12,color:"#888",cursor:"pointer",fontWeight:600}}>+ Dodaj termin</button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Vežbe

            <div><Lbl c="Tagovi"/><div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:2}}>{TAGS.map(t=><button key={t} onClick={()=>setD(dd=>({...dd,tags:dd.tags.includes(t)?dd.tags.filter(x=>x!==t):[...dd.tags,t]}))} style={{padding:"3px 8px",borderRadius:20,border:"1px solid",background:d.tags.includes(t)?"#0A0A0A":"white",color:d.tags.includes(t)?"white":"#555",fontSize:10,fontFamily:"inherit",cursor:"pointer"}}>{t}</button>)}</div></div>

          <Btn ch="Dodaj vežbu" onClick={()=>{if(!d.name.trim())return;setEx(e=>[{...d,id:Date.now()},...e]);setD({name:"",tags:[],desc:"",int:3,zan:3});setAdd(false);}}/>
        </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:16}}>
        {TAGS.map(t=><button key={t} onClick={()=>toggleT(t)} style={{padding:"4px 10px",borderRadius:20,border:"1px solid "+(at.includes(t)?"#0A0A0A":"#E2E2E2"),background:at.includes(t)?"#0A0A0A":"white",color:at.includes(t)?"white":"#555",fontSize:10,fontFamily:"inherit",cursor:"pointer",fontWeight:at.includes(t)?700:400}}>{t}</button>)}
        {at.length>0&&<button onClick={()=>setAt([])} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #DC2626",background:"white",color:"#DC2626",fontSize:10,fontFamily:"inherit",cursor:"pointer"}}>× Obriši</button>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(auto-fill,minmax(280px,1fr))",gap:mob?9:11}}>

          <div key={e.id} style={{background:"white",border:"1px solid #E2E2E2",borderRadius:11,padding:mob?14:18}}>

            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{e.tags.map(t=><span key={t} style={{padding:"2px 8px",borderRadius:20,background:"#F5F5F5",fontSize:9,color:"#666"}}>{t}</span>)}</div>
            {e.desc&&<div style={{fontSize:12,color:"#666",lineHeight:1.6}}>{e.desc}</div>}
            <div style={{display:"flex",gap:12,marginTop:10,paddingTop:10,borderTop:"1px solid #F0F0F0",fontSize:10,color:"#888"}}>
              <span>Intenzitet <strong style={{color:"#DC2626"}}>{e.int}/5</strong></span>
              <span>Zanimljivost <strong style={{color:"#16A34A"}}>{e.zan}/5</strong></span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Napredak (global)
function Napredak({players,mob}){
  const getL=p=>{const ks=Object.keys(p.ratings).sort();return ks.length?{per:ks[ks.length-1],r:p.ratings[ks[ks.length-1]],prev:ks.length>=2?p.ratings[ks[ks.length-2]]:null}:null;};
  const withR=players.filter(p=>Object.keys(p.ratings).length>0);
  const noR=players.filter(p=>Object.keys(p.ratings).length===0);
  const pad=mob?"16px":"34px 42px";
  return(
    <div style={{padding:pad}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?28:38,fontWeight:800,letterSpacing:"-1px",marginBottom:4}}>NAPREDAK</div>
      <div style={{color:"#888",fontSize:11,marginBottom:mob?16:22}}>{withR.length} sa ocjenama · {noR.length} bez</div>
      {withR.map(p=>{
        const l=getL(p);if(!l)return null;
        const {r,prev,per}=l;const avg=Math.round((r.T+r.Ta+r.F+r.P)/4*10)/10;
        return(
          <div key={p.id} style={{background:"white",border:"1px solid #E2E2E2",borderRadius:11,padding:mob?14:20,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"#0A0A0A",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,flexShrink:0}}>{ini(p.name)}</div>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?16:19,fontWeight:700}}>{p.name}</div>
                  <div style={{color:"#888",fontSize:10,marginTop:2}}>{p.pos} · {p.club||"—"}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?24:30,fontWeight:800,lineHeight:1}}>{avg}</div>
                <div style={{fontSize:8,color:"#888",marginTop:1}}>{per}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:mob?8:11}}>
              {PILLARS.map(pi=>{
                const val=r[pi.key]||0;const pv=prev?prev[pi.key]||0:null;const trend=pv!==null?val-pv:null;
                return(
                  <div key={pi.key}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,alignItems:"center"}}>
                      <span style={{fontSize:8,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:"0.3px"}}>{pi.label}</span>
                      <div style={{display:"flex",alignItems:"center",gap:3}}>
                        {trend!==null&&<span style={{fontSize:8,fontWeight:700,color:trend>0?"#16A34A":trend<0?"#DC2626":"#888"}}>{trend>0?"+"+trend:trend<0?trend:""}</span>}
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800,color:pi.color}}>{val}</span>
                      </div>
                    </div>
                    <div style={{height:5,background:"#F0F0F0",borderRadius:3,overflow:"hidden"}}>
                      <div style={{width:`${val/10*100}%`,height:"100%",background:pi.color}}/>
                    </div>
                    {pv!==null&&<div style={{height:2,marginTop:2,position:"relative"}}>
                      <div style={{position:"absolute",left:0,width:`${pv/10*100}%`,height:2,background:pi.color+"44",borderRadius:1}}/>
                    </div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
      {noR.length>0&&(
        <div style={{background:"white",border:"1px solid #E2E2E2",borderRadius:11,padding:mob?14:18,marginTop:6}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:800,letterSpacing:"1px",color:"#AAA",marginBottom:10}}>BEZ OCJENA</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {noR.map(p=><div key={p.id} style={{background:"#FAFAFA",border:"1px solid #E2E2E2",borderRadius:7,padding:"5px 10px",fontSize:11,color:"#888"}}>{p.name}</div>)}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Članarine (global)
function Clanarine({players,setPlayers,mob}){
  const yr=2026;const CM=[1,2,3,4,5];
  const tog=(pid,k)=>setPlayers(prev=>prev.map(p=>{if(p.id!==pid)return p;const m={...p.mem||{}};if(m[k]===undefined)m[k]="paid";else if(m[k]==="paid")m[k]="unpaid";else delete m[k];return{...p,mem:m};}));
  let exp=players.length*CM.length*FEE,coll=0;
  players.forEach(p=>CM.forEach(m=>{if((p.mem||{})["2026-"+String(m).padStart(2,"0")]==="paid")coll+=FEE;}));
  const out=exp-coll;const fmt=n=>n.toLocaleString("sr-RS")+" RSD";
  const pad=mob?"16px":"34px 42px";
  return(
    <div style={{padding:pad}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?28:38,fontWeight:800,letterSpacing:"-1px",marginBottom:18}}>ČLANARINE {yr}</div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:mob?9:12,marginBottom:18}}>
        {[["Očekivano (Jan–Maj)",fmt(exp),"#0A0A0A"],["Naplaćeno",fmt(coll),"#16A34A"],["Dug",fmt(out),"#DC2626"]].map(([l,v,c])=>(
          <div key={l} style={{background:"white",border:"1px solid #E2E2E2",borderRadius:11,padding:mob?"12px 14px":"14px 18px",borderTop:"4px solid "+c}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:mob?18:22,fontWeight:800,color:c}}>{v}</div>
            <div style={{fontSize:10,color:"#888",marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{height:4,background:"#F0F0F0",borderRadius:2,marginBottom:6,overflow:"hidden"}}>
        <div style={{width:`${(coll/exp*100).toFixed(0)}%`,height:"100%",background:"#16A34A"}}/>
      </div>
      <div style={{fontSize:10,color:"#888",marginBottom:16}}>{(coll/exp*100).toFixed(0)}% naplaćeno</div>
      <div className="mem-scroll">
        <div style={{background:"white",border:"1px solid #E2E2E2",borderRadius:12,overflow:"hidden",minWidth:mob?700:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"170px repeat(12,1fr)",background:"#0A0A0A",color:"white"}}>
            <div style={{padding:"8px 14px",fontSize:8,fontWeight:700,letterSpacing:"2px"}}>IGRAČ</div>
            {MONTHS_S.map((m,i)=><div key={m} style={{padding:"8px 2px",textAlign:"center",fontSize:8,fontWeight:700,background:CM.includes(i+1)?"#111":"#0A0A0A"}}>{m.toUpperCase()}</div>)}
          </div>
          {players.map((p,idx)=>{
            const paidC=CM.filter(m=>(p.mem||{})["2026-"+String(m).padStart(2,"0")]==="paid").length;
            return(
              <div key={p.id} style={{display:"grid",gridTemplateColumns:"170px repeat(12,1fr)",borderBottom:idx<players.length-1?"1px solid #F5F5F5":"none"}}>
                <div style={{padding:"8px 14px",display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:"#0A0A0A",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,flexShrink:0}}>{ini(p.name)}</div>
                  <div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                  {paidC===CM.length&&<span style={{fontSize:8,background:"#F0FDF4",color:"#16A34A",padding:"1px 4px",borderRadius:20,fontWeight:700,flexShrink:0}}>✓</span>}
                </div>
                {MONTHS_S.map((m,i)=>{
                  const k="2026-"+String(i+1).padStart(2,"0");
                  const v=(p.mem||{})[k];const isCM=CM.includes(i+1);
                  return<button key={k} onClick={()=>isCM&&tog(p.id,k)} style={{border:"none",cursor:isCM?"pointer":"default",padding:"6px 2px",textAlign:"center",fontSize:11,fontWeight:700,background:v==="paid"?isCM?"#F0FDF4":"#F9FFF9":v==="unpaid"?"#FEF2F2":"#FAFAFA",color:v==="paid"?"#16A34A":v==="unpaid"?"#DC2626":"#DDD",opacity:isCM?1:0.4}}>
                    {v==="paid"?"✓":v==="unpaid"?"×":"—"}
                  </button>;
                })}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{marginTop:10,display:"flex",gap:14,fontSize:10,color:"#888",flexWrap:"wrap"}}>
        <span><strong style={{color:"#16A34A"}}>✓</strong> Plaćeno</span>
        <span><strong style={{color:"#DC2626"}}>×</strong> Duguje</span>
        <span style={{fontStyle:"italic"}}>Klikni za promjenu · Jan–Maj aktivan period</span>
      </div>
    </div>
  );
}

// ── App
function App(){
  const w=useW();const mob=w<640;const tab=w>=640&&w<1024;
  const [nav,setNav]=useState("dash");
  const [players,setPlayers]=useState(PLAYERS);
  const [sessions,setSessions]=useState(INIT_SESSIONS);
  const [apid,setApid]=useState(null);
  const setPlayer=u=>setPlayers(pl=>pl.map(p=>p.id===u.id?u:p));
  const ap=players.find(p=>p.id===apid);
  const doNav=n=>{setNav(n);setApid(null);};
  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      {!mob&&<Sidebar active={nav} setActive={doNav} pc={players.length}/>}
      <div style={{flex:1,overflow:"auto",background:"#F3F3F3",paddingBottom:mob?64:0}}>
        {nav==="dash"    &&<Dashboard players={players} sessions={sessions} setNav={doNav} openPlayer={id=>{setApid(id);doNav("players");}} mob={mob}/>}
        {nav==="players" &&!ap&&<Players players={players} onSel={id=>setApid(id)} onAdd={p=>setPlayers(pl=>[...pl,p])} onDel={id=>setPlayers(pl=>pl.filter(x=>x.id!==id))} mob={mob}/>}
        {nav==="players" &&ap&&<PlayerDetail p={ap} setP={setPlayer} onBack={()=>setApid(null)} mob={mob}/>}
        {nav==="planer"  &&<Planer players={players} sessions={sessions} setSessions={setSessions} mob={mob}/>}
        {nav==="vezbe"   &&<Vezbe mob={mob}/>}
        {nav==="napredak"&&<Napredak players={players} mob={mob}/>}
        {nav==="clanarine"&&<Clanarine players={players} setPlayers={setPlayers} mob={mob}/>}
      </div>
      {mob&&<BottomNav active={nav} setActive={doNav}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
